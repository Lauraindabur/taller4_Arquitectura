# nginx/nginx.conf

# 1. Backend Django (Gunicorn)
# El nombre "web" debe coincidir con el servicio en docker-compose
upstream django_backend {
    server web:8000;
}

server {
    # Nginx escucha en el puerto 80
    listen 80;

    # Ignorar logs de favicon
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # 2. Proxy inverso hacia Django
    location / {
        proxy_pass http://django_backend;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Nota:
    # Aquí en el futuro puedes agregar:
    # location /api/v2/ {
    #     proxy_pass http://otro_servicio;
    # }
}